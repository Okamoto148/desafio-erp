services:
  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - erp-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: erp-app
    volumes:
      - ./backend:/var/www
    networks:
      - erp-network

  db:
    image: mysql:8.0
    container_name: erp-db
    environment:
      MYSQL_DATABASE: erp_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - erp-network

  frontend:
    image: node:20
    container_name: erp-vue
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge